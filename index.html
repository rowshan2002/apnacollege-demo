<!DOCTYPE html>
<html>
<head>
    <title>Even Number Checker</title>
</head>
<body>
    <h1>Check if a Number is Even</h1>
    
    <script>
        function isEven(num) {
            return num % 2 === 0;
        }
        
        // Test the function
        console.log(isEven(4));   // true
        console.log(isEven(7));   // false
        console.log(isEven(0));   // true
        console.log(isEven(-2));  // true
    </script>
</body>
</html>
